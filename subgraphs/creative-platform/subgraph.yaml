specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MeTokens
    network: base
    source:
      # MeTokens Diamond (Subscribe / Mint / Burn / Register emit here — not the factory)
      address: "0xba5502db2aC2cBff189965e991C07109B14eB3f5"
      abi: MeTokens
      startBlock: 16584541
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/metokens.ts
      entities:
        - Subscribe
        - Mint
        - Burn
        - Register
      abis:
        - name: MeTokens
          file: ./abis/MeTokens.json
      eventHandlers:
        - event: Subscribe(indexed address,indexed address,uint256,address,uint256,string,string,uint256)
          handler: handleSubscribe
        - event: Mint(address,address,address,address,uint256,uint256)
          handler: handleMint
        - event: Burn(address,address,address,address,uint256,uint256)
          handler: handleBurn
        - event: Register(uint256,address,address,address,uint256,uint256,uint32,bytes)
          handler: handleRegister

  - kind: ethereum
    name: RealityETH
    network: base
    source:
      address: "0x2F39f464d16402Ca3D8527dA89617b73DE2F60e8"
      abi: RealityETH
      startBlock: 26260675
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/realityEth.ts
      entities:
        - Question
        - Answer
      abis:
        - name: RealityETH
          file: ./abis/RealityETH-3.0.json
      eventHandlers:
        # Shapes match Base RealityETH-3.0 (see lib/sdk/reality-eth/reality-eth-abi.json). Wrong signatures = zero entities.
        - event: LogNewQuestion(indexed bytes32,indexed address,uint256,string,indexed bytes32,address,uint32,uint32,uint256,uint256)
          handler: handleNewQuestion
        - event: LogNewAnswer(bytes32,indexed bytes32,bytes32,indexed address,uint256,uint256,bool)
          handler: handleNewAnswer
        - event: LogFinalize(indexed bytes32,indexed bytes32)
          handler: handleFinalize
