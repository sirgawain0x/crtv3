specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:

  # 1. CATALOG (Uses the Zora V1 Media contract)
  - kind: ethereum
    name: CatalogRegistry
    network: mainnet
    source:
      address: "0xabEFBc9fD2F806065b4f3C237d4b59D9A97Bcac7" # The REAL Catalog/ZoraV1 address
      abi: Catalog
      startBlock: 12000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: Catalog, file: ./abis/Catalog.json }]
      eventHandlers:
        # Catalog uses standard transfer events when a 1-of-1 song is minted
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleCatalogTransfer
      file: ./src/mapping.eth.ts

  # 2. SOUND.XYZ (Legacy)
  - kind: ethereum
    name: SoundFactory
    network: mainnet
    source:
      address: "0x0000000000aec84F5BFc2af15EAfb943bf4e3522" # The REAL Sound Factory
      abi: SoundCreatorV2
      startBlock: 15000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: SoundCreatorV2, file: ./abis/SoundCreatorV2.json }]
      eventHandlers:
        # Sound shouts this when an artist drops a new track
        - event: SoundEditionCreated(indexed address,indexed address,indexed address)
          handler: handleSoundCreated
      file: ./src/mapping.eth.ts

  # 3. ZORA (Legacy Drops)
  - kind: ethereum
    name: ZoraDrops
    network: mainnet
    source:
      address: "0x0dff6d464fea23a8a4e0cd6fe94f44b51ef0d96c" # The REAL Zora 721 Drop
      abi: ZoraNFTCreator
      startBlock: 14000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: ZoraNFTCreator, file: ./abis/ZoraNFTCreator.json }]
      eventHandlers:
        - event: CreatedDrop(indexed address,indexed address,uint256)
          handler: handleZoraDrop
      file: ./src/mapping.eth.ts

templates:
  # The blueprint for reading the actual songs after the factory creates them
  - kind: ethereum
    name: MusicNFTCollection
    network: mainnet
    source:
      abi: ERC721
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: ERC721, file: ./abis/ERC721.json }]
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTemplateTransfer
      file: ./src/mapping.eth.ts