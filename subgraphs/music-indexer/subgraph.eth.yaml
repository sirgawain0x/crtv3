specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: CatalogRegistry
    network: mainnet
    source:
      address: "0x79277f2401614fF527E580A78aE79E66F78C00D6"
      abi: Catalog
      startBlock: 12000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: Catalog, file: ./abis/Catalog.json }]
      eventHandlers:
        - event: Mint(indexed uint256,indexed address,string)
          handler: handleCatalogMint
      file: ./src/mapping.eth.ts
  - kind: ethereum
    name: SoundFactory
    network: mainnet
    source:
      address: "0x322813Fd9A0757951151eDe4668ec737475313e9"
      abi: MintSongsFactory
      startBlock: 14000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: MintSongsFactory, file: ./abis/MintSongsFactory.json }]
      eventHandlers:
        - event: CreatedCollection(indexed address,indexed address,string)
          handler: handleSoundCreatedCollection
      file: ./src/mapping.eth.ts
  - kind: ethereum
    name: RoyalFactory
    network: mainnet
    source:
      address: "0xBd3531dA5CF5857e7CfAA92426877b022e612cf8"
      abi: MintSongsFactory
      startBlock: 14000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: MintSongsFactory, file: ./abis/MintSongsFactory.json }]
      eventHandlers:
        - event: CreatedCollection(indexed address,indexed address,string)
          handler: handleRoyalCreatedCollection
      file: ./src/mapping.eth.ts
  - kind: ethereum
    name: EulerBeatPrints
    network: mainnet
    source:
      address: "0xc7800762145300B42687118dF805663737C820f0"
      abi: ERC721
      startBlock: 12000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: ERC721, file: ./abis/ERC721.json }]
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleEulerBeatTransfer
      file: ./src/mapping.eth.ts
  - kind: ethereum
    name: ZoraMedia
    network: mainnet
    source:
      address: "0xabEFBc9fF2c302927236319842F266A0C22B0054"
      abi: ERC721
      startBlock: 12000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: ERC721, file: ./abis/ERC721.json }]
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleZoraTransfer
      file: ./src/mapping.eth.ts
templates:
  - kind: ethereum
    name: MusicNFTCollection
    network: mainnet
    source:
      abi: ERC721
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: ERC721, file: ./abis/ERC721.json }]
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTemplateTransfer
      file: ./src/mapping.eth.ts
