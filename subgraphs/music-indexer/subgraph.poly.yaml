specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MintSongsFactory
    network: matic
    source:
      address: "0x37a672728D98C68E9e346F4B727404a37788478A"
      abi: MintSongsFactory
      startBlock: 20000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: MintSongsFactory, file: ./abis/MintSongsFactory.json }]
      eventHandlers:
        - event: CreatedCollection(indexed address,indexed address,string)
          handler: handleMintSongsCreatedCollection
      file: ./src/mapping.poly.ts
templates:
  - kind: ethereum
    name: MusicNFTCollection
    network: matic
    source:
      abi: ERC721
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [MusicTrack]
      abis: [{ name: ERC721, file: ./abis/ERC721.json }]
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTemplateTransfer
      file: ./src/mapping.poly.ts
